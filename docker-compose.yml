version: "3.9"

# ==========================================================================
# Bibliothèque Numérique Microservices — Orchestration Docker Compose
# Stack : Flask (backends) + React (frontend) + MySQL + Docker + Jenkins
# Tâche 5 (DevOps/CI-CD)

services:

  # --------------------------------------------------------------------
  # Base de données relationnelle (MySQL)
  # --------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: bibliotheque_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: bibliotheque
      MYSQL_USER: biblio_user
      MYSQL_PASSWORD: biblio_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Microservice Livres (Flask)
  # --------------------------------------------------------------------
  livres:
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    container_name: service_livres
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://biblio_user:biblio_pass@db:3306/bibliotheque
      PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Microservice Utilisateurs (Flask)
  # --------------------------------------------------------------------
  utilisateurs:
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    container_name: service_utilisateurs
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://biblio_user:biblio_pass@db:3306/bibliotheque
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Microservice Emprunts (Flask)
  # Appelle Livres et Utilisateurs via leurs noms de service Docker
  # --------------------------------------------------------------------
  emprunts:
    build:
      context: ./services/emprunts
      dockerfile: Dockerfile
    container_name: service_emprunts
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://biblio_user:biblio_pass@db:3306/bibliotheque
      LIVRES_SERVICE_URL: http://livres:8001
      UTILISATEURS_SERVICE_URL: http://utilisateurs:8002
      PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
      livres:
        condition: service_started
      utilisateurs:
        condition: service_started
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Frontend (React)
  # Consomme les 3 API ci-dessus
  # --------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biblio_frontend
    restart: unless-stopped
    environment:
      REACT_APP_LIVRES_API: http://localhost:8001
      REACT_APP_UTILISATEURS_API: http://localhost:8002
      REACT_APP_EMPRUNTS_API: http://localhost:8003
    ports:
      - "3000:3000"
    depends_on:
      - livres
      - utilisateurs
      - emprunts
    networks:
      - biblio_network

networks:
  biblio_network:
    driver: bridge

volumes:
  db_data:
