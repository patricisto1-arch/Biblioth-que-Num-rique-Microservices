version: "3.9"

# ==========================================================================
# Bibliothèque Numérique Microservices — Orchestration Docker Compose
# Stack : Flask (backends) + React (frontend) + PostgreSQL + Docker + Jenkins
# Tâche 5 (DevOps/CI-CD)

services:

  # --------------------------------------------------------------------
  # Base de données (PostgreSQL)
  # --------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: database-biblio
    environment:
      POSTGRES_USER: user_biblio
      POSTGRES_PASSWORD: password_secure
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      # Chargement automatique du schéma fourni par le chef
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_biblio -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Microservice Livres (Flask)
  # --------------------------------------------------------------------
  livres:
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    container_name: service_livres
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user_biblio:password_secure@db:5432/library_db
      PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Microservice Utilisateurs (Flask)
  # --------------------------------------------------------------------
  utilisateurs:
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    container_name: service_utilisateurs
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user_biblio:password_secure@db:5432/library_db
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Microservice Emprunts (Flask)
  # --------------------------------------------------------------------
  emprunts:
    build:
      context: ./services/emprunts
      dockerfile: Dockerfile
    container_name: service_emprunts
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user_biblio:password_secure@db:5432/library_db
      LIVRES_SERVICE_URL: http://livres:8001
      UTILISATEURS_SERVICE_URL: http://utilisateurs:8002
      PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
      livres:
        condition: service_started
      utilisateurs:
        condition: service_started
    networks:
      - biblio_network

  # --------------------------------------------------------------------
  # Frontend (React)
  # --------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biblio_frontend
    restart: unless-stopped
    environment:
      REACT_APP_LIVRES_API: http://localhost:8001
      REACT_APP_UTILISATEURS_API: http://localhost:8002
      REACT_APP_EMPRUNTS_API: http://localhost:8003
    ports:
      - "3000:80"
    depends_on:
      - livres
      - utilisateurs
      - emprunts
    networks:
      - biblio_network

networks:
  biblio_network:
    driver: bridge

volumes:
  postgres_data: