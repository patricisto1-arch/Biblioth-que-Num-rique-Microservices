# Microservice Utilisateurs (Tâche 2)
  
services:  
  utilisateurs:
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    container_name: service-utilisateurs
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=rootpassword
      - DB_NAME=bibliotheque
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s